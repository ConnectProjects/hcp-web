<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="description" content="MasterDB — HCP-Web office administration">
  <title>MasterDB — HCP-Web</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./print.css">

  <!-- MSAL.js — Microsoft Authentication Library for browser -->
  <script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
  <!-- sql.js: SQLite compiled to WebAssembly -->
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <!-- SheetJS: Excel / CSV workbook generation (MIT, v0.18.5) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "@shared/": "../shared/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div class="boot-screen">
      <div class="boot-inner">
        <div class="boot-title">MasterDB</div>
        <div class="boot-msg" id="boot-msg">Initializing database…</div>
      </div>
    </div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
