name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate lead-finder/config.js from secrets
        run: |
          cat > lead-finder/config.js << 'JSEOF'
          export const SUPABASE_URL      = 'SUPABASE_URL_PLACEHOLDER';
          export const SUPABASE_ANON_KEY = 'SUPABASE_ANON_KEY_PLACEHOLDER';
          export const GOOGLE_PLACES_API_KEY = 'GOOGLE_PLACES_API_KEY_PLACEHOLDER';
          JSEOF
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" lead-finder/config.js
          sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" lead-finder/config.js
          sed -i "s|GOOGLE_PLACES_API_KEY_PLACEHOLDER|${{ secrets.GOOGLE_PLACES_API_KEY }}|g" lead-finder/config.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,lead-finder/.env,lead-finder/node_modules'
