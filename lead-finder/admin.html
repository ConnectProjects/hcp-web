<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#76B214">
  <title>Lead Finder — NAICS Admin</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">Lead Finder</div>
      <div class="sidebar-brand-sub">Industrial Division</div>
    </div>
    <ul class="sidebar-nav">
      <li><a href="./dashboard.html"  class="nav-item"><span class="nav-icon">📋</span> Dashboard</a></li>
      <li><a href="./discovery.html"  class="nav-item"><span class="nav-icon">🔍</span> Discover</a></li>
      <li><a href="./admin.html"      class="nav-item active"><span class="nav-icon">⚙️</span> NAICS Admin</a></li>
      <li><a href="./help.html"       class="nav-item"><span class="nav-icon">❓</span> Help</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user" data-user-email></div>
      <button class="btn-logout" id="logout-btn"><span>↩</span> Sign out</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-area">
    <div class="main-header">
      <h1>NAICS Admin</h1>
      <p>Review and adjust noise-hazard flags and hazard scores for each NAICS code</p>
    </div>
    <div class="main-content">

      <div class="filter-bar" style="align-items:center">
        <div class="admin-toggle">
          <input type="radio" name="show-filter" id="show-all"   value="all"   checked>
          <label for="show-all">All codes</label>
          <input type="radio" name="show-filter" id="show-noise" value="noise">
          <label for="show-noise">Noise hazard only</label>
        </div>
        <div class="filter-group" style="margin-left:12px">
          <input type="search" id="admin-search" placeholder="Search code or descriptor…" style="min-width:220px;border:1px solid var(--grey-300);border-radius:var(--radius);padding:6px 10px;font-size:13px">
        </div>
        <div class="filter-actions" style="margin-left:auto">
          <span class="text-muted text-small" id="admin-count"></span>
          <button class="btn btn-secondary btn-sm" id="save-all-btn">Save all changes</button>
        </div>
      </div>

      <div class="table-wrap">
        <div style="overflow-x:auto">
          <table class="data-table" id="admin-table">
            <thead>
              <tr>
                <th style="width:90px">Code</th>
                <th>Descriptor</th>
                <th style="width:70px">Level</th>
                <th style="width:120px">Noise hazard?</th>
                <th style="width:90px">Score (1–5)</th>
              </tr>
            </thead>
            <tbody id="admin-tbody">
              <tr class="loading-row"><td colspan="5">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
